metric: monthly_net_revenue
description: >
  Net revenue by cohort month from completed orders. Excludes tax.
  Used on the Finance Overview dashboard's revenue trend.
grain:
  - cohort_month
measures:
  - revenue
  - customers
business_rules:
  - "net revenue excludes tax"
  - "only order_status = 'completed' counts"
  - "cohort_month is the first day of the order month"
source_old: old_source_sample.csv   # legacy ERP / reporting mart extract
source_new: new_source_sample.csv   # new ERP platform extract
owner: needs owner review
